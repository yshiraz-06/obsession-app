<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E32" />
      <stop offset="50%" stop-color="#0E0E18" />
      <stop offset="100%" stop-color="#08080E" />
    </linearGradient>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="50%" stop-color="#DB2777" />
      <stop offset="100%" stop-color="#F43F5E" />
    </linearGradient>
    <linearGradient id="inner-glow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C4B5FD" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#8B5CF6" flood-opacity="0.45" />
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Box with Squircle Border Radius -->
  <rect x="16" y="16" width="480" height="480" rx="120" ry="120" fill="url(#bg-grad)" stroke="rgba(255, 255, 255, 0.12)" stroke-width="8" />
  
  <!-- Outer Glow Ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#primary-grad)" stroke-width="28" stroke-linecap="round" filter="url(#drop-shadow)" opacity="0.9" />

  <!-- Inner Dynamic Ring / Letter 'O' Core -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#inner-glow)" stroke-width="18" stroke-dasharray="640 160" stroke-dashoffset="40" stroke-linecap="round" filter="url(#glow)" />

  <!-- Center AI Neural Pulse / Heart Chat Emblem -->
  <g transform="translate(256, 256) scale(1.15)">
    <!-- Pulse Wave Line -->
    <path d="M-60 0 L-35 0 L-18 -42 L0 42 L18 -26 L35 0 L60 0" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
    <!-- Center Core Dot -->
    <circle cx="0" cy="0" r="8" fill="#F43F5E" />
  </g>

  <!-- Accent Floating Particles for Futuristic AI Feel -->
  <circle cx="360" cy="140" r="12" fill="#C4B5FD" opacity="0.8" filter="url(#glow)" />
  <circle cx="150" cy="370" r="8" fill="#DB2777" opacity="0.6" />
  <circle cx="380" cy="350" r="10" fill="#8B5CF6" opacity="0.7" />
</svg>
